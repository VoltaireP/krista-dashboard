        }

        }

        }

        .header-meta {
            font-size: 12px;
            color: #a0a0a0;
        }

        .header-meta p {
            margin: 4px 0;
        }

        .kaizen-branding {

        }

        .kaizen-branding p {
            color: #a29bfe;
            margin: 2px 0;
        }

        /* Week Selector */
        .week-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .week-btn {
            padding: 10px 16px;
            background: rgba(49, 64, 89, 0.6);
            border: 2px solid transparent;
            color: #a0a0a0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .week-btn:hover {
            border-color: #fdcb6e;
            color: #fdcb6e;
        }

        .week-btn.active {
            background: linear-gradient(135deg, #e17055 0%, #d35040 100%);
            border-color: #e17055;
            color: white;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            margin-bottom: -2px;
        }

        .tab-btn:hover {
            color: #fdcb6e;
        }

        .tab-btn.active {
            color: #e17055;
            border-bottom-color: #e17055;
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: rgba(49, 64, 89, 0.5);
            border-left: 4px solid #e17055;
            padding: 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            background: rgba(49, 64, 89, 0.7);
            transform: translateY(-2px);
        }

        .kpi-label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: bold;
            color: #fdcb6e;
            margin-bottom: 8px;
        }

        .kpi-change {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .kpi-change.positive {
            background: rgba(0, 206, 201, 0.2);
            color: #00cec9;
        }

        .kpi-change.negative {
            background: rgba(225, 112, 85, 0.2);
            color: #e17055;
        }

        .kpi-change.neutral {
            background: rgba(160, 160, 160, 0.2);
            color: #a0a0a0;
        }

        /* Campaign Cards */
        .campaigns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .campaign-card {
            background: rgba(49, 64, 89, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .campaign-card:hover {
            border-color: #e17055;
            background: rgba(49, 64, 89, 0.7);
        }

        .campaign-name {
            font-size: 16px;
            font-weight: bold;
            color: #fdcb6e;
            margin-bottom: 12px;
        }

        .campaign-type {
            font-size: 11px;
            color: #a29bfe;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .campaign-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-item {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }

        .metric-item:first-child {
            border-top: none;
        }

        .metric-label {
            font-size: 11px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 18px;
            font-weight: bold;
            color: #00cec9;
        }

        /* Table Styles */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(49, 64, 89, 0.5);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .data-table thead {
            background: rgba(26, 31, 54, 0.8);
            border-bottom: 2px solid #e17055;
        }

        .data-table th {
            padding: 15px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #e17055;
        }

        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .data-table tbody tr:hover {
            background: rgba(49, 64, 89, 0.7);
        }

            gap: 20px;
            margin-bottom: 40px;
        }

        .insight-card {

            padding: 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);

            border-left-color: #e17055;
        }

        .insight-card.info {
            border-left-color: #74b9ff;
        }

        .insight-card.positive {
            border-left-color: #00cec9;
        }

            font-weight: bold;
            color: #fdcb6e;
            margin-bottom: 8px;

            font-size: 16px;
        }

        .insight-text {

            color: #c0c0c0;

            font-weight: bold;
            color: #00cec9;

            font-weight: bold;
            color: #fdcb6e;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;

        .chart-canvas {

                        { name: "Dear New Widow", type: "leadgen", spend: 557.58, leads: 224, cpl: 2.49, linkClicks: 560, lpv: 519, ctr: 0, cpm: 0, reach: 0, impressions: 0 },
                        { name: "Grief Stage Assessment", type: "leadgen", spend: 370.68, leads: 457, cpl: 0.81, linkClicks: 774, lpv: 38, ctr: 0, cpm: 0, reach: 0, impressions: 0 },
                        { name: "Testimonial Video Views", type: "video", spend: 210.87, videoViews: 20194, costPerView: 0.010, reach: 0, impressions: 0, frequency: 0 },
                        { name: "Spring Pass", type: "purchase", spend: 180.58, purchases: 0, linkClicks: 104, videoViews: 280, ctr: 0, cpm: 0, reach: 0, impressions: 0 }
                    ],
                    topAds: [
                        { rank: 1, name: "1 Year Myth", campaign: "Stories", spend: 0, results: 254, costPer: 0.73, resultType: "leads" },
                        { rank: 2, name: "Am I Normal", campaign: "Stories", spend: 0, results: 174, costPer: 0.78, resultType: "leads" },
                        { rank: 3, name: "January MTM Image", campaign: "Memories That Matter", spend: 0, results: 315, costPer: 1.83, resultType: "leads" },
                        { rank: 4, name: "December Image + New Copy", campaign: "New Widow Bundle", spend: 0, results: 87, costPer: 2.31, resultType: "leads" }
                    ]
                }
            ]
        };

        // ==================== STATE ====================
        let currentWeekIndex = DASHBOARD_DATA.weeks.length - 1;
        let currentTab = 'overview';

        // ==================== UTILITIES ====================
        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }

        function formatNumber(value) {
            if (value >= 1000000) {
                return (value / 1000000).toFixed(1) + 'M';
            }
            if (value >= 1000) {
                return (value / 1000).toFixed(1) + 'K';
            }
            return value.toLocaleString();
        }

        function formatDecimal(value, decimals = 2) {
            return parseFloat(value).toFixed(decimals);
        }

        function getChangePercentage(current, previous) {
            if (previous === 0) return 0;
            return ((current - previous) / previous) * 100;
        }

        function getChangeClass(change) {
            if (change > 5) return 'positive';
            if (change < -5) return 'negative';
            return 'neutral';
        }

        function formatChange(change) {
            if (change === 0) return 'No change';
            const sign = change > 0 ? '+' : '';
            return sign + formatDecimal(change, 1) + '% vs prev week';
        }

        // ==================== WEEK SELECTOR ====================
        function renderWeekSelector() {
            const container = document.getElementById('weekSelector');
            container.innerHTML = '';

            DASHBOARD_DATA.weeks.forEach((week, index) => {
                const btn = document.createElement('button');
                btn.className = 'week-btn' + (index === currentWeekIndex ? ' active' : '');
                btn.textContent = week.label;
                btn.addEventListener('click', () => selectWeek(index));
                container.appendChild(btn);
            });
        }

        function selectWeek(index) {
            currentWeekIndex = index;
            renderWeekSelector();
            renderAllTabs();
        }

        // ==================== TAB NAVIGATION ====================
        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const tab = e.target.dataset.tab;
                    selectTab(tab);
                });
            });
        }

        function selectTab(tab) {
            currentTab = tab;

            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(tab).classList.add('active');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            renderTabContent();
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderAllTabs() {
            renderOverviewTab();
            renderCampaignsTab();
            renderTopAdsTab();
            renderAIInsightsTab();
            renderRawDataTab();
        }

        function renderOverviewTab() {
            renderKPIs();
            renderCharts();
        }

        function renderKPIs() {
            const week = DASHBOARD_DATA.weeks[currentWeekIndex];
            const prevWeek = currentWeekIndex > 0 ? DASHBOARD_DATA.weeks[currentWeekIndex - 1] : null;

            const kpis = [
                {
                    label: 'Total Spend',
                    value: formatCurrency(week.account.spend),
                    change: prevWeek ? getChangePercentage(week.account.spend, prevWeek.account.spend) : 0
                },
                {
                    label: 'Total Leads',
                    value: week.campaigns.reduce((sum, c) => sum + (c.leads || 0), 0),
                    change: prevWeek ? getChangePercentage(
                        week.campaigns.reduce((sum, c) => sum + (c.leads || 0), 0),
                        prevWeek.campaigns.reduce((sum, c) => sum + (c.leads || 0), 0)
                    ) : 0
                },
                {
                    label: 'Cost Per Lead',
                    value: formatDecimal(week.account.spend / week.campaigns.reduce((sum, c) => sum + (c.leads || 0), 0), 2),
                    change: prevWeek ? getChangePercentage(
                        week.account.spend / (week.campaigns.reduce((sum, c) => sum + (c.leads || 0), 0) || 1),
                        prevWeek.account.spend / (prevWeek.campaigns.reduce((sum, c) => sum + (c.leads || 0), 0) || 1)
                    ) : 0
                },
                {
                    label: 'Impressions',
                    value: formatNumber(week.account.impressions),
                    change: prevWeek ? getChangePercentage(week.account.impressions, prevWeek.account.impressions) : 0
                },
                {
                    label: 'Reach',
                    value: formatNumber(week.account.reach),
                    change: prevWeek ? getChangePercentage(week.account.reach, prevWeek.account.reach) : 0
                },
                {
                    label: 'Video Views',
                    value: formatNumber(week.account.videoViews),
                    change: prevWeek ? getChangePercentage(week.account.videoViews, prevWeek.account.videoViews) : 0
                }
            ];

            const container = document.getElementById('kpiContainer');
            container.innerHTML = kpis.map(kpi => `
                <div class="kpi-card">
                    <div class="kpi-label">${kpi.label}</div>
                    <div class="kpi-value">${kpi.value}</div>
                    <div class="kpi-change ${getChangeClass(kpi.change)}">
                        ${formatChange(kpi.change)}
                    </div>
                </div>
            `).join('');
        }

        function renderCharts() {
            renderSpendLeadsChart();
            renderBudgetChart();
        }

        function renderSpendLeadsChart() {
            const ctx = document.getElementById('spendLeadsChart').getContext('2d');

            if (window.spendLeadsChartInstance) {
                window.spendLeadsChartInstance.destroy();
            }

            const labels = DASHBOARD_DATA.weeks.map(w => w.label);
            const spendData = DASHBOARD_DATA.weeks.map(w => w.account.spend);

                            type: 'line',

                            fill: true,

                            pointBackgroundColor: '#00cec9',

        function renderBudgetChart() {
            const ctx = document.getElementById('budgetChart').getContext('2d');

            const spendData = week.campaigns.filter(c => c.spend > 0).map(c => c.spend);

            const colors = ['#e17055', '#00cec9', '#fdcb6e', '#a29bfe', '#74b9ff', '#55efc4', '#fd79a8'];

            window.budgetChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: campaignNames,
                    datasets: [{
                        data: spendData,
                        backgroundColor: colors.slice(0, campaignNames.length),
                        borderColor: 'rgba(26, 31, 54, 0.95)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#a0a0a0',
                                font: { size: 11 },
                                padding: 15
                            }
                        }
                    }
                }
            });
        }

        function renderCampaignsTab() {
            const week = DASHBOARD_DATA.weeks[currentWeekIndex];

            container.innerHTML = week.campaigns.map(campaign => {
                let metricsHTML = '';

                if (campaign.type === 'leadgen') {

                            <div class="metric-value">${formatCurrency(campaign.spend)}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Leads</div>
                            <div class="metric-value">${campaign.leads}</div>
                        </div>
                        <div class="metric-item">

                            <div class="metric-value">$${formatDecimal(campaign.cpl, 2)}</div>
                        </div>
                        <div class="metric-item">

                            <div class="metric-value">${campaign.linkClicks}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">LPVs</div>

                    `;
                } else if (campaign.type === 'video') {

                        </div>

                            <div class="metric-value">$${formatDecimal(campaign.costPerView, 3)}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Reach</div>
                            <div class="metric-value">${formatNumber(campaign.reach)}</div>
                        </div>
                    `;
                } else if (campaign.type === 'purchase') {
                    metricsHTML = `
                        <div class="metric-item">
                            <div class="metric-label">Spend</div>
                            <div class="metric-value">${formatCurrency(campaign.spend)}</div>
                        </div>
                        <div class="metric-item">

                        </div>

        function renderSparklines() {
            const container = document.getElementById('sparklinesContainer');
            const leadGenCampaigns = ['Stories', 'Memories That Matter', 'New Widow Bundle', 'Dear New Widow', 'Grief Stage Assessment'];

            container.innerHTML = leadGenCampaigns.map(campaignName => {
                const leadsData = DASHBOARD_DATA.weeks.map(w => {
                    const camp = w.campaigns.find(c => c.name === campaignName);
                    return camp ? camp.leads : 0;
                });

                return `
                    <div class="sparkline-card">
                        <div class="sparkline-label">${campaignName} - Leads</div>
                        <canvas class="sparkline-canvas" data-campaign="${campaignName}"></canvas>
                    </div>
                `;
            }).join('');

            // Draw sparklines
            leadGenCampaigns.forEach(campaignName => {
                const canvas = document.querySelector(`[data-campaign="${campaignName}"]`);
                if (canvas) {
                    drawSparkline(canvas, campaignName);
                }
            });
        }

        function drawSparkline(canvas, campaignName) {
            const ctx = canvas.getContext('2d');
            const leadsData = DASHBOARD_DATA.weeks.map(w => {
                const camp = w.campaigns.find(c => c.name === campaignName);
                return camp ? camp.leads : 0;
            });

            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: DASHBOARD_DATA.weeks.map((_, i) => i),
                    datasets: [{
                        data: leadsData,
                        borderColor: '#00cec9',
                        backgroundColor: 'rgba(0, 206, 201, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { display: false }
                    }
                }
            });
        }

        function renderTopAdsTab() {
            const week = DASHBOARD_DATA.weeks[currentWeekIndex];
            const container = document.getElementById('topAdsContainer');

            if (!week.topAds || week.topAds.length === 0) {
                container.innerHTML = '<div class="no-data">No top ads data available for this week.</div>';
                return;
            }

            const html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Ad Name</th>
                            <th>Campaign</th>
                            <th>Results</th>
                            <th>Cost Per Result</th>
                            <th>Result Type</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${week.topAds.map(ad => `
                            <tr>
                                <td>#${ad.rank}</td>
                                <td>${ad.name}</td>
                                <td>${ad.campaign}</td>
                                <td>${ad.results}</td>
                                <td>$${formatDecimal(ad.costPer, 2)}</td>
                                <td><span style="color: #00cec9;">${ad.resultType}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        function renderAIInsightsTab() {
            const week = DASHBOARD_DATA.weeks[currentWeekIndex];
            const prevWeek = currentWeekIndex > 0 ? DASHBOARD_DATA.weeks[currentWeekIndex - 1] : null;
            const insights = generateInsights(week, prevWeek);

            const container = document.getElementById('insightsContainer');
            container.innerHTML = insights.map(insight => `
                <div class="insight-card ${insight.type}">
                    <div class="insight-title">
                        <span class="insight-icon">${insight.icon}</span>
                        ${insight.title}
                    </div>
                    <div class="insight-text">${insight.text}</div>
                    ${insight.metric ? `<div class="insight-metric">${insight.metric}</div>` : ''}
                </div>
            `).join('');
        }

        function generateInsights(week, prevWeek) {
            const insights = [];

            // Calculate metrics
            const currentLeads = week.campaigns.reduce((sum, c) => sum + (c.leads || 0), 0);
            const currentCPL = week.account.spend / (currentLeads || 1);
            const currentSpend = week.account.spend;

            if (prevWeek) {
                const prevLeads = prevWeek.campaigns.reduce((sum, c) => sum + (c.leads || 0), 0);
                const prevCPL = prevWeek.account.spend / (prevLeads || 1);
                const prevSpend = prevWeek.account.spend;

                const leadsChange = getChangePercentage(currentLeads, prevLeads);
                const cplChange = getChangePercentage(currentCPL, prevCPL);
                const spendChange = getChangePercentage(currentSpend, prevSpend);

                // Lead volume insights
                if (leadsChange > 10) {
                    insights.push({
                        type: 'positive',
                        icon: '📈',
                        title: 'Strong Lead Growth',
                        text: `Lead volume increased significantly compared to the previous week, indicating strong campaign performance.`,
                        metric: `${leadsChange > 0 ? '+' : ''}${formatDecimal(leadsChange, 1)}% change`
                    });
                } else if (leadsChange < -10) {
                    insights.push({
                        type: 'warning',
                        icon: '⚠️',
                        title: 'Lead Volume Declining',
                        text: `Lead generation has decreased. Consider reviewing campaign targeting and creative performance.`,
                        metric: `${formatDecimal(leadsChange, 1)}% change`
                    });
                }

                // CPL insights
                if (cplChange > 15) {
                    insights.push({
                        type: 'warning',
                        icon: '⚠️',
                        title: 'Cost Per Lead Increasing',
                        text: `CPL has risen significantly. This may indicate audience fatigue or reduced ad relevance. Consider refreshing creatives or adjusting targeting.`,
                        metric: `CPL: $${formatDecimal(currentCPL, 2)} (+${formatDecimal(cplChange, 1)}%)`
                    });
                } else if (cplChange < -15) {
                    insights.push({
                        type: 'positive',
                        icon: '✨',
                        title: 'Cost Per Lead Improved',
                        text: `CPL has decreased, showing improved campaign efficiency and better audience targeting.`,
                        metric: `CPL: $${formatDecimal(currentCPL, 2)} (${formatDecimal(cplChange, 1)}%)`
                    });
                }
            }

            // Top campaign insight
            const topCampaign = week.campaigns.reduce((a, b) => (b.leads || 0) - (a.leads || 0));
            if (topCampaign && topCampaign.leads > 0) {
                insights.push({
                    type: 'info',
                    icon: '⭐',
                    title: 'Top Campaign',
                    text: `"${topCampaign.name}" is your strongest performer with the most leads this week.`,
                    metric: `${topCampaign.leads} leads at $${formatDecimal(topCampaign.cpl, 2)} CPL`
                });
            }

            // Video awareness insight
            const videoSpend = week.campaigns.filter(c => c.type === 'video').reduce((sum, c) => sum + c.spend, 0);
            const videoViews = week.account.videoViews;
            if (videoViews > 20000) {
                insights.push({
                    type: 'positive',
                    icon: '🎥',
                    title: 'Strong Video Reach',
                    text: `Video campaigns are building substantial awareness with significant video views this week.`,
                    metric: `${formatNumber(videoViews)} views from ${formatCurrency(videoSpend)} spend`
                });
            }

            // Budget efficiency
            const cpm = week.account.spend / (week.account.impressions / 1000);
            insights.push({
                type: 'info',
                icon: '💰',
                title: 'Budget Performance',
                text: `Current campaign efficiency is solid with good reach relative to spend.`,
                metric: `CPM: $${formatDecimal(cpm, 2)}`
            });

            return insights;
        }

        function renderRawDataTab() {
            const week = DASHBOARD_DATA.weeks[currentWeekIndex];
            const container = document.getElementById('rawDataContainer');

            const html = `
                <h3 style="color: #fdcb6e; margin-bottom: 20px; font-size: 16px;">Week: ${week.label}</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Campaign</th>
                            <th>Type</th>
                            <th>Spend</th>
                            <th>Leads</th>
                            <th>CPL</th>
                            <th>Link Clicks</th>
                            <th>LPV</th>
                            <th>Video Views</th>
                            <th>Reach</th>
                            <th>Impressions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${week.campaigns.map(c => `
                            <tr>
                                <td>${c.name}</td>
                                <td><span style="color: #a29bfe; text-transform: uppercase; font-size: 11px;">${c.type}</span></td>
                                <td>${formatCurrency(c.spend)}</td>
                                <td>${c.leads || '-'}</td>
                                <td>${c.cpl > 0 ? '$' + formatDecimal(c.cpl, 2) : '-'}</td>
                                <td>${c.linkClicks || '-'}</td>
                                <td>${c.lpv || '-'}</td>
                                <td>${c.videoViews || '-'}</td>
                                <td>${c.reach || '-'}</td>
                                <td>${c.impressions || '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        function renderTabContent() {
            if (currentTab === 'overview') renderOverviewTab();
            else if (currentTab === 'campaigns') renderCampaignsTab();
            else if (currentTab === 'top-ads') renderTopAdsTab();
            else if (currentTab === 'ai-insights') renderAIInsightsTab();
            else if (currentTab === 'raw-data') renderRawDataTab();
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            renderWeekSelector();
            initTabs();
            renderAllTabs();
        });
    </script>
